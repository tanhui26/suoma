<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎登录 · 悦享界面</title>
    <!-- 柔和风格，现代感欢迎页，包含用户名/密码登录框 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f9f2f0 0%, #f0e7f5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* 装饰性背景元素 —— 增加欢迎氛围 */
        body::before {
            content: '';
            position: absolute;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 210, 210, 0.35), rgba(230, 210, 255, 0.2));
            top: 5%;
            left: -30px;
            z-index: 0;
            filter: blur(50px);
        }

        body::after {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle at 70% 80%, rgba(190, 220, 255, 0.45), rgba(215, 190, 250, 0.15));
            bottom: 0;
            right: -20px;
            z-index: 0;
            filter: blur(70px);
        }

        .welcome-card {
            position: relative;
            z-index: 10;
            max-width: 440px;
            width: 100%;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border-radius: 48px 48px 48px 48px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 30px 60px -20px rgba(55, 35, 70, 0.25), 0 8px 20px 0 rgba(255, 240, 250, 0.4);
            padding: 2.8rem 2.2rem 2.8rem 2.2rem;
            transition: transform 0.2s ease;
        }

        .welcome-card:hover {
            transform: scale(1.01);
            box-shadow: 0 35px 65px -20px rgba(75, 45, 95, 0.3);
        }

        /* 欢迎头部 */
        .welcome-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .welcome-header h1 {
            font-size: 2.8rem;
            font-weight: 650;
            letter-spacing: -0.5px;
            background: linear-gradient(130deg, #3d2b4f, #6e4f7e, #9b6b9f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.25rem;
            line-height: 1.2;
            text-shadow: 0 2px 10px rgba(230, 210, 250, 0.5);
        }

        .welcome-header .greeting {
            font-size: 1.1rem;
            color: #4a3a55;
            background: rgba(245, 235, 250, 0.6);
            display: inline-block;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            font-weight: 460;
            letter-spacing: 0.3px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            margin-top: 0.6rem;
        }

        /* 表单区域 */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .input-group label {
            font-size: 0.9rem;
            font-weight: 540;
            color: #3e2d47;
            letter-spacing: 0.2px;
            margin-left: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .input-group label i {
            font-style: normal;
            font-size: 1.1rem;
            opacity: 0.8;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.75);
            border-radius: 100px;
            border: 1.5px solid rgba(210, 185, 220, 0.3);
            transition: all 0.2s ease;
            padding: 0.2rem 0.2rem 0.2rem 1.2rem;
            backdrop-filter: blur(4px);
        }

        .input-wrapper:hover {
            border-color: #c9afda;
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 0 0 4px rgba(210, 180, 230, 0.15);
        }

        .input-wrapper:focus-within {
            border-color: #b28ac6;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(170, 130, 200, 0.2);
        }

        .input-wrapper input {
            width: 100%;
            border: none;
            background: transparent;
            padding: 0.9rem 0.5rem 0.9rem 0;
            font-size: 1rem;
            font-weight: 450;
            color: #2b1f30;
            outline: none;
        }

        .input-wrapper input::placeholder {
            color: #a58eb5;
            font-weight: 350;
            font-size: 0.95rem;
        }

        /* 可选的图标装饰 (模拟用户名/密码小标记) */
        .input-wrapper .input-icon {
            font-size: 1.2rem;
            color: #9179a0;
            margin-right: 6px;
        }

        /* 额外选项区 (保持简洁，但可以加一个“忘记密码”占位，仅为视觉) */
        .login-extras {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 0.2rem;
            font-size: 0.9rem;
        }

        .login-extras a {
            color: #6f5182;
            text-decoration: none;
            border-bottom: 1px dashed #cbb2d9;
            font-weight: 460;
            transition: color 0.15s, border-bottom 0.15s;
        }

        .login-extras a:hover {
            color: #412e4f;
            border-bottom: 1px solid #8666a0;
        }

        /* 登录按钮 —— 突出欢迎感 */
        .login-button {
            background: linear-gradient(115deg, #6d4f89, #906fa3, #aa87ba);
            border: none;
            border-radius: 100px;
            padding: 1rem 1.8rem;
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            letter-spacing: 0.8px;
            cursor: pointer;
            box-shadow: 0 12px 25px -5px rgba(120, 80, 140, 0.5);
            transition: all 0.2s ease;
            margin-top: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-button span {
            font-size: 1.5rem;
            line-height: 1;
        }

        .login-button:hover {
            background: linear-gradient(115deg, #7e5b9c, #9d7ab5, #b693cb);
            box-shadow: 0 18px 30px -5px #8866a8;
            transform: translateY(-3px);
        }

        .login-button:active {
            transform: translateY(1px);
            box-shadow: 0 8px 20px -3px #775594;
        }

        /* 注册引导 / 欢迎语尾巴 */
        .welcome-footer {
            text-align: center;
            margin-top: 2.3rem;
            color: #4d3a58;
            font-weight: 430;
            border-top: 1px solid rgba(200, 175, 215, 0.3);
            padding-top: 1.8rem;
            font-size: 0.95rem;
            display: flex;
            justify-content: center;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .welcome-footer .heart {
            color: #b477a3;
            font-size: 1.2rem;
            line-height: 1;
            margin: 0 2px;
        }

        .welcome-footer a {
            color: #783f82;
            text-decoration: none;
            font-weight: 550;
            border-bottom: 1px solid transparent;
            transition: border-bottom 0.15s;
        }

        .welcome-footer a:hover {
            border-bottom: 1px solid #b288c3;
        }

        /* 针对小屏幕微调 */
        @media (max-width: 480px) {
            .welcome-card {
                padding: 2rem 1.5rem;
                border-radius: 36px;
            }

            .welcome-header h1 {
                font-size: 2.3rem;
            }

            .input-wrapper input {
                padding: 0.8rem 0.3rem 0.8rem 0;
            }

            .login-button {
                padding: 0.9rem 1rem;
                font-size: 1.1rem;
            }
        }

        /* 简单模拟的“用户名/密码”提示小标志 (不依赖外置字体) */
        .icon-symbol {
            display: inline-block;
            width: 1.2rem;
            text-align: center;
            font-weight: 400;
            color: #7f6293;
        }

        /* 空点击演示(防止实际提交) */
        .login-button[type="button"] {
            /* 保持按钮样式 */
        }
    </style>
</head>
<body>
    <div class="welcome-card">
        <div class="welcome-header">
            <h1>✨ 欢迎回来</h1>
            <div class="greeting">
                ⚡ 登录以继续 · 悦享每一刻
            </div>
        </div>

        <!-- 登录表单：包含用户名和密码字段 (无JavaScript, 仅视觉组件) -->
        <form class="login-form" action="#" method="post" onsubmit="event.preventDefault(); alert('演示页面 · 欢迎登录 (无实际提交)');">
            <div class="input-group">
                <label for="username">
                    <i class="icon-symbol">👤</i> 用户名
                </label>
                <div class="input-wrapper">
                    <span class="input-icon">✨</span>
                    <input type="text" id="username" name="username" placeholder="your.name@example.com 或 昵称" autocomplete="username" required>
                </div>
            </div>

            <div class="input-group">
                <label for="password">
                    <i class="icon-symbol">🔐</i> 密码
                </label>
                <div class="input-wrapper">
                    <span class="input-icon">✦</span>
                    <input type="password" id="password" name="password" placeholder="············" autocomplete="current-password" required>
                </div>
                <!-- 忘记密码占位链接，仅仅作为设计元素，不跳转 -->
                <div class="login-extras">
                    <a href="#" onclick="return false;">忘了密码？</a>
                </div>
            </div>

            <button class="login-button" type="submit">
                <span>➤</span> 登录 · 进入欢迎页
            </button>
        </form>

        <div class="welcome-footer">
            <span>还没有账号？</span>
            <a href="#" onclick="return false;">立即注册</a>
            <span class="heart">❤️</span>
            <span>轻松加入</span>
        </div>

        <!-- 极简装饰文字（说明仅为欢迎界面，无后端） -->
        <div style="text-align: center; margin-top: 1rem; font-size: 0.75rem; color: #917ca3; opacity: 0.6; letter-spacing: 0.2px;">
            —— 欢迎页面 · 用户名 / 密码 演示 ——
        </div>
    </div>

    <!-- 简单的视觉提示：点击提交显示对话框，模拟友好交互 (已在form中定义了onsubmit) -->
    <!-- 同时阻止链接跳转（使用return false） -->
</body>
</html>
